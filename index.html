<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26F/W 수주 출고 스케줄</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  :root{
    --bg:#EFF6FB;
    --surface:#FFFFFF;
    --border:#DCE9F5;
    --ink:#132433;
    --ink-soft:#5C7288;
    --ink-faint:#9BAEC2;

    --teal:#2E9AE0;
    --teal-dark:#1868B0;
    --teal-light:#E4F3FC;
    --amber:#F5A623;
    --amber-light:#FDECC8;
    --coral:#E8604C;
    --blue:#7C5CE0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;padding:48px 24px 100px;}

  /* Header */
  header.board-head{
    text-align:center;
    margin-bottom:28px;
  }
  .board-title{
    font-weight:800;
    font-size:32px;
    letter-spacing:-0.6px;
    margin:0 0 10px;
    color:var(--ink);
  }
  .board-title .accent{color:var(--teal);}
  .board-sub{
    display:inline-block;
    font-size:12.5px;
    font-weight:700;
    color:var(--teal-dark);
    background:var(--teal-light);
    padding:5px 14px;
    border-radius:20px;
    letter-spacing:0.2px;
  }
  .board-meta{
    font-size:12px;
    color:var(--ink-faint);
    font-weight:500;
    margin-top:12px;
  }

  .content{position:relative;}

  .toolbar{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
  }
  .search-box{
    font-family:inherit;font-size:14.5px;padding:12px 20px;border:none;
    border-radius:24px;background:var(--surface);width:320px;max-width:100%;color:var(--ink);
    text-align:center;
    box-shadow:0 6px 20px rgba(20,90,160,0.10);
  }
  .search-box::placeholder{color:var(--ink-faint);}
  .search-box:focus{outline:none;box-shadow:0 0 0 3px var(--teal-light), 0 6px 20px rgba(20,90,160,0.10);}
  .toolbar{gap:12px;align-items:center;}
  .change-legend{
    display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
    color:#C0142C;background:#FDEBEC;padding:8px 14px;border-radius:20px;white-space:nowrap;
  }
  .change-dot{width:7px;height:7px;border-radius:50%;background:#C0142C;display:inline-block;}

  /* Calendar */
  .cal-wrap{
    background:var(--surface);border:1px solid var(--border);border-radius:24px;
    padding:32px;box-shadow:0 10px 40px rgba(20,90,160,0.08);
  }
  .cal-head{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:26px;}
  .cal-month{font-weight:800;font-size:21px;letter-spacing:-0.3px;min-width:150px;text-align:center;color:var(--ink);}
  .cal-nav button{
    width:38px;height:38px;border-radius:12px;border:none;background:var(--teal-light);
    color:var(--teal-dark);cursor:pointer;font-size:17px;line-height:1;font-weight:700;
    transition:background .15s ease;
  }
  .cal-nav button:hover{background:var(--teal);color:#fff;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{
    font-size:12.5px;font-weight:800;color:var(--ink-faint);text-align:center;padding:6px 0 12px;
    text-transform:uppercase;letter-spacing:0.3px;
  }
  .cal-dow.sun{color:var(--coral);}
  .cal-dow.sat{color:var(--blue);}

  .cal-cell{
    min-height:108px;border-radius:14px;padding:10px 8px;background:#F3F9FD;
    border:1.5px solid transparent;display:flex;flex-direction:column;gap:5px;
    transition:all .12s ease;
  }
  .cal-cell.empty{background:transparent;}
  .cal-cell.today{border-color:var(--amber);background:var(--amber-light);}
  .cal-cell.today .cal-date{color:#B9791A;}
  .cal-cell.has-items{cursor:pointer;}
  .cal-cell.has-items:hover{background:var(--teal-light);transform:translateY(-1px);}
  .cal-cell.selected{background:var(--teal);border-color:var(--teal-dark);}
  .cal-cell.selected .cal-date{color:#fff;}
  .cal-cell.selected .cal-chip{background:rgba(255,255,255,0.9);color:var(--teal-dark);}
  .cal-cell.selected .cal-more{color:rgba(255,255,255,0.85);}
  .cal-date{font-size:14px;font-weight:700;color:var(--ink);}
  .cal-cell.empty .cal-date{color:transparent;}
  .cal-chip{
    font-size:11.5px;font-weight:700;color:var(--teal-dark);background:var(--teal-light);
    border-radius:7px;padding:4px 7px;line-height:1.35;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    position:relative;
  }
  .cal-chip.changed{
    background:#FDEBEC;color:#C0142C;
    padding-left:16px;
  }
  .cal-chip.changed::before{
    content:'●';position:absolute;left:6px;top:50%;transform:translateY(-50%);
    font-size:8px;color:#C0142C;
  }
  .cal-more{font-size:11px;color:var(--ink-soft);font-weight:700;padding-left:2px;}

  .cal-detail{margin-top:28px;padding-top:26px;border-top:2px dashed var(--border);}
  .cal-detail-label{
    font-size:15px;font-weight:800;color:var(--teal-dark);margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .cal-detail-label::before{content:"📦";}
  .cal-detail-items{display:flex;flex-direction:column;gap:10px;}
  .notice-card{
    background:#F3F9FD;border-left:4px solid var(--teal);border-radius:12px;
    padding:16px 20px;
  }
  .notice-title{font-weight:700;font-size:15.5px;color:var(--ink);}
  .notice-body{font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin-top:6px;}
  .code-list{display:flex;flex-wrap:wrap;gap:6px;}
  .code-group{margin-top:12px;padding-left:10px;border-left:3px solid var(--teal);}
  .code-group-label{
    display:inline-block;font-size:12px;font-weight:800;color:var(--teal-dark);
    background:#fff;border:1.5px solid var(--teal);
    padding:3px 11px;border-radius:20px;margin-bottom:8px;letter-spacing:0.2px;
  }
  .code-chip{
    font-size:13px;font-weight:700;color:var(--teal-dark);background:var(--teal-light);
    border-radius:8px;padding:6px 11px;letter-spacing:0.2px;
  }
  .notice-author{font-size:11.5px;color:var(--ink-faint);margin-top:10px;font-weight:600;}
  .notice-note{font-size:12.5px;color:var(--amber);font-weight:700;margin-top:8px;}

  .update-note{
    font-size:13.5px;font-weight:700;color:#FFFFFF;background:#003087;
    border-radius:10px;padding:10px 14px;margin-bottom:12px;
  }

  .brand-logo{
    height:34px;width:auto;display:block;margin-bottom:12px;
  }

  .empty-state{
    text-align:center;padding:16px 0 0;color:var(--ink-faint);font-size:13.5px;
  }

  /* Tabs */
  .tabbar{
    display:flex;justify-content:center;gap:8px;margin-bottom:20px;
  }
  .tab-btn{
    font-family:inherit;font-size:14px;font-weight:700;padding:10px 22px;
    border:none;border-radius:20px;background:var(--surface);color:var(--ink-soft);
    cursor:pointer;box-shadow:0 4px 14px rgba(20,90,160,0.08);transition:all .15s ease;
  }
  .tab-btn:hover{color:var(--teal-dark);}
  .tab-btn.active{background:var(--teal);color:#fff;box-shadow:0 6px 18px rgba(46,154,224,0.35);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* Section divider */
  .section-gap{margin-top:32px;}
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    margin-bottom:14px;flex-wrap:wrap;
  }
  .section-title{font-weight:800;font-size:18px;letter-spacing:-0.3px;color:var(--ink);}
  .section-desc{font-size:12.5px;color:var(--ink-soft);font-weight:500;}
  .legend{display:flex;gap:10px;font-size:12px;color:var(--ink-soft);font-weight:600;}
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}
  .legend .dot.done{background:#2E9AE0;}
  .legend .dot.wait{background:#C9D6E2;}
  .filter-btn{
    font-family:inherit;font-size:12px;font-weight:700;padding:7px 14px;border:none;
    border-radius:16px;background:var(--surface);color:var(--ink-soft);cursor:pointer;
    box-shadow:0 3px 10px rgba(20,90,160,0.08);transition:all .15s ease;
  }
  .filter-btn:hover{color:var(--teal-dark);}
  .filter-btn.active{background:var(--teal);color:#fff;}

  /* Product status list */
  .prod-wrap{
    background:var(--surface);border:1px solid var(--border);border-radius:24px;
    padding:28px;box-shadow:0 10px 40px rgba(20,90,160,0.08);
  }
  .prod-group{margin-bottom:28px;}
  .prod-group:last-child{margin-bottom:0;}
  .prod-group-title{
    font-size:15px;font-weight:800;color:var(--ink);margin-bottom:12px;
    padding-bottom:10px;border-bottom:2px solid var(--teal);
    display:flex;align-items:center;gap:8px;
  }
  .prod-group-count{
    font-size:11.5px;font-weight:700;color:#fff;background:var(--teal);
    padding:2px 9px;border-radius:12px;
  }
  .prod-cat{margin-bottom:12px;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .prod-cat:last-child{margin-bottom:0;}
  .prod-cat-title{
    font-size:13.5px;font-weight:800;color:var(--teal-dark);
    padding:14px 16px;cursor:pointer;list-style:none;
    display:flex;align-items:center;justify-content:space-between;
    background:#F3F9FD;user-select:none;
  }
  .prod-cat-title::-webkit-details-marker{display:none;}
  .prod-cat-title::after{
    content:'▾';font-size:11px;color:var(--ink-faint);transition:transform .15s ease;
  }
  .prod-cat[open] .prod-cat-title::after{transform:rotate(180deg);}
  .prod-cat .prod-grid{padding:14px 16px;}
  .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
  .prod-card{
    background:#F3F9FD;border-radius:12px;padding:10px 12px;
    border:1.5px solid transparent;
  }
  .prod-card.done{background:var(--teal-light);border-color:var(--teal);}
  .prod-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .prod-code{font-weight:800;font-size:13.5px;color:var(--ink);letter-spacing:-0.1px;}
  .prod-badge{
    font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:20px;white-space:nowrap;
  }
  .prod-badge.done{background:var(--teal);color:#fff;}
  .prod-badge.wait{background:#E4EAF0;color:var(--ink-soft);}
  .prod-meta{font-size:11.5px;color:var(--ink-soft);margin-top:5px;font-weight:600;}
  .prod-ship-eta{font-size:12.5px;color:#C0142C;font-weight:800;margin-top:4px;}
  .prod-note{font-size:11.5px;color:var(--amber);font-weight:700;margin-top:3px;}
  .prod-release{font-size:11.5px;color:var(--teal-dark);font-weight:700;margin-top:4px;}


  @media (max-width:640px){
    .board-title{font-size:24px;}
    .cal-wrap{padding:18px;}
    .cal-cell{min-height:76px;padding:6px 4px;}
    .cal-chip{font-size:10px;padding:3px 5px;}
  }
</style>
</head>

function formatDate(d){
  const [y,m,day] = d.split("-");
  return `${m}월 ${day}일`;
}

function findCategoryForCode(code){
  const match = PRODUCTS.find(p => codesMatch(code, p.code));
  return match ? match.category : null;
}

function noticeCardHTML(n){
  const codes = n.body.split('/').map(c => c.trim()).filter(Boolean);
  const byCat = {};
  codes.forEach(c => {
    const cat = findCategoryForCode(c) || '기타';
    (byCat[cat] = byCat[cat] || []).push(c);
  });
  const groupsHTML = Object.keys(byCat).map(cat => `
    <div class="code-group">
      <div class="code-group-label">${cat}</div>
      <div class="code-list">${byCat[cat].map(c => `<span class="code-chip">${c}</span>`).join('')}</div>
    </div>`).join('');
  const noteHTML = n.note ? `<div class="notice-note">변경: ${n.note}</div>` : '';
  return `
    <div class="notice-card">
      <div class="notice-title">${n.title}</div>
      ${groupsHTML}
      ${noteHTML}
    </div>`;
}

  if(items.length === 0) return '';
  return `
    <div class="cal-detail">
      <div class="cal-detail-label">${formatDate(dateStr)} 출고 스케줄 (${items.length}건)</div>
      <div class="cal-detail-items">${items.map(noticeCardHTML).join('')}</div>
    </div>`;
}

function renderCalendar(){
  const term = searchTerm.trim().toLowerCase();
  const shipments = NOTICES.filter(n =>
    !term || n.title.toLowerCase().includes(term) || n.body.toLowerCase().includes(term));

  const byDate = {};
  shipments.forEach(n => { (byDate[n.date] = byDate[n.date] || []).push(n); });

  const firstOfMonth = new Date(calYear, calMonth - 1, 1);
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const startWeekday = firstOfMonth.getDay();
  const monthLabel = `${calYear}년 ${calMonth}월`;
  const todayStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;

  if(selectedDate && !selectedDate.startsWith(`${calYear}-${String(calMonth).padStart(2,'0')}`)){
    selectedDate = null;
  }

  let cells = '';
  for(let i=0;i<startWeekday;i++){ cells += `<div class="cal-cell empty"><div class="cal-date">-</div></div>`; }
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const items = byDate[dateStr] || [];
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedDate;
    const hasItems = items.length > 0;
    const chips = items.slice(0,2).map(n => {
      const changed = !!n.note;
      return `<div class="cal-chip ${changed ? 'changed' : ''}" title="${n.title}${changed ? ' (일정 변경: ' + n.note + ')' : ''}">${n.title}</div>`;
    }).join('');
    const more = items.length > 2 ? `<div class="cal-more">+${items.length-2}건</div>` : '';
    const classes = ['cal-cell'];
    if(isToday) classes.push('today');
    if(hasItems) classes.push('has-items');
    if(isSelected) classes.push('selected');
    cells += `
      <div class="${classes.join(' ')}" ${hasItems ? `data-date="${dateStr}"` : ''}>
        <div class="cal-date">${day}</div>
        ${chips}${more}
      </div>`;
  }

  const detail = selectedDate ? renderCalDetailHTML(selectedDate, byDate[selectedDate] || []) : '';
  const totalCount = shipments.length;

  document.getElementById('mainView').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-head">
        <div class="cal-nav"><button id="calPrev">‹</button></div>
        <div class="cal-month">${monthLabel}</div>
        <div class="cal-nav"><button id="calNext">›</button></div>
      </div>
      <div class="cal-grid">
        <div class="cal-dow sun">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow sat">토</div>
        ${cells}
      </div>
      ${detail}
      ${totalCount === 0 ? '<div class="empty-state">검색 결과가 없습니다</div>' : ''}
    </div>`;

  document.getElementById('calPrev').addEventListener('click', () => shiftMonth(-1));
  document.getElementById('calNext').addEventListener('click', () => shiftMonth(1));
  document.querySelectorAll('.cal-cell.has-items').forEach(cell => {
    cell.addEventListener('click', () => {
      const d = cell.dataset.date;
      selectedDate = (selectedDate === d) ? null : d;
      renderCalendar();
    });
  });
}

function shiftMonth(delta){
  calMonth += delta;
  if(calMonth < 1){ calMonth = 12; calYear -= 1; }
  if(calMonth > 12){ calMonth = 1; calYear += 1; }
  renderCalendar();
}

function formatEta(eta){
  if(!eta) return '입고예정일 미정';
  const [y,m,day] = eta.split('-');
  return `${m}월 ${day}일 입고예정`;
}

// 출고캘린더(NOTICES)에 등록된 상품코드를 찾아, 있으면 그 날짜를 우선 사용
function normalizeCode(s){
  return String(s || '').replace(/\(.*?\)/g, '').replace(/\s+/g, '').toUpperCase();
}
function codesMatch(noticeToken, productCode){
  const a = normalizeCode(noticeToken);
  const b = normalizeCode(productCode);
  if(!a || !b) return false;
  return b.startsWith(a) || a.startsWith(b);
}
function findCalendarNotice(code){
  let matched = null;
  NOTICES.forEach(n => {
    const tokens = n.body.split('/').map(s => s.trim());
    if(tokens.some(t => codesMatch(t, code))) matched = n; // 배열상 나중에 나오는(최근 등록된) 것을 우선
  });
  return matched;
}

function formatShipDate(dateStr){
  const [y,m,day] = dateStr.split('-');
  return `${parseInt(m,10)}월 ${parseInt(day,10)}일`;
}

function productCardHTML(p){
  const badge = p.done
    ? `<span class="prod-badge done">초도출고완료</span>`
    : `<span class="prod-badge wait">출고예정</span>`;
  const calNotice = findCalendarNotice(p.code);
  const shipEtaHTML = calNotice
    ? `<div class="prod-ship-eta">출고 예정일 : ${formatShipDate(calNotice.date)}</div>`
    : '';
  const noteHTML = (calNotice && calNotice.note)
    ? `<div class="prod-note">변경: ${calNotice.note}</div>`
    : '';
  const releaseHTML = p.release
    ? `<div class="prod-release">출시 : ${p.release}</div>`
    : '';
  return `
    <div class="prod-card ${p.done ? 'done' : ''}">
      <div class="prod-top">
        <div class="prod-code">${p.code}</div>
        ${badge}
      </div>
      <div class="prod-meta">${p.color} · ${p.size}</div>
      ${releaseHTML}
      ${shipEtaHTML}
      ${noteHTML}
    </div>`;
}

function renderProducts(){
  const term = searchTerm.trim().toLowerCase();
  const list = PRODUCTS.filter(p => {
    if(p.hidden) return false;
    const matchesTerm = !term ||
      p.code.toLowerCase().includes(term) ||
      p.category.toLowerCase().includes(term) ||
      p.color.toLowerCase().includes(term);
    const isConfirmed = !!findCalendarNotice(p.code);
    let matchesFilter = true;
    if(productFilter === 'done') matchesFilter = p.done;
    else if(productFilter === 'confirmed') matchesFilter = !p.done && isConfirmed;
    else if(productFilter === 'wait') matchesFilter = !p.done && !isConfirmed;
    return matchesTerm && matchesFilter;
  });

  if(list.length === 0){
    document.getElementById('productView').innerHTML = `<div class="prod-wrap"><div class="empty-state">검색 결과가 없습니다</div></div>`;
    return;
  }

  const shouldOpen = term || productFilter !== null;
  const groupOrder = ['세양', '수입'];
  const byGroup = {};
  list.forEach(p => { (byGroup[p.group] = byGroup[p.group] || []).push(p); });

  const groupsHTML = groupOrder
    .filter(g => byGroup[g] && byGroup[g].length > 0)
    .map(g => {
      const byCat = {};
      byGroup[g].forEach(p => { (byCat[p.category] = byCat[p.category] || []).push(p); });
      const catsHTML = Object.keys(byCat).map(cat => `
        <details class="prod-cat" ${shouldOpen ? 'open' : ''}>
          <summary class="prod-cat-title">${cat} (${byCat[cat].length})</summary>
          <div class="prod-grid">${byCat[cat].map(productCardHTML).join('')}</div>
        </details>`).join('');
      return `
        <div class="prod-group">
          <div class="prod-group-title">${g === '세양' ? '세양 (국내 생산)' : '수입 상품'} <span class="prod-group-count">${byGroup[g].length}</span></div>
          ${catsHTML}
        </div>`;
    }).join('');

  document.getElementById('productView').innerHTML = `<div class="prod-wrap">${groupsHTML}</div>`;
}

function setProductFilter(f){
  productFilter = (productFilter === f) ? null : f; // 같은 버튼 다시 누르면 전체 보기로
  document.getElementById('filterConfirmed').classList.toggle('active', productFilter === 'confirmed');
  document.getElementById('filterWait').classList.toggle('active', productFilter === 'wait');
  document.getElementById('filterDone').classList.toggle('active', productFilter === 'done');
  renderProducts();
}

document.getElementById('filterConfirmed').addEventListener('click', () => setProductFilter('confirmed'));
document.getElementById('filterWait').addEventListener('click', () => setProductFilter('wait'));
document.getElementById('filterDone').addEventListener('click', () => setProductFilter('done'));

document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderCalendar();
  renderProducts();
});

document.getElementById('tabBtnCal').addEventListener('click', () => {
  document.getElementById('tabBtnCal').classList.add('active');
  document.getElementById('tabBtnProd').classList.remove('active');
  document.getElementById('tabPanelCal').classList.add('active');
  document.getElementById('tabPanelProd').classList.remove('active');
  document.getElementById('changeLegend').style.display = 'flex';
});

document.getElementById('tabBtnProd').addEventListener('click', () => {
  document.getElementById('tabBtnProd').classList.add('active');
  document.getElementById('tabBtnCal').classList.remove('active');
  document.getElementById('tabPanelProd').classList.add('active');
  document.getElementById('tabPanelCal').classList.remove('active');
  document.getElementById('changeLegend').style.display = 'none';
});

renderCalendar();
renderProducts();

</script>
</body>
</html>
