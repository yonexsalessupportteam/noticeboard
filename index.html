<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26F/W 수주 출고 스케줄</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  :root{
    --bg:#EFF6FB;
    --surface:#FFFFFF;
    --border:#DCE9F5;
    --ink:#132433;
    --ink-soft:#5C7288;
    --ink-faint:#9BAEC2;

    --teal:#2E9AE0;
    --teal-dark:#1868B0;
    --teal-light:#E4F3FC;
    --amber:#F5A623;
    --amber-light:#FDECC8;
    --coral:#E8604C;
    --blue:#7C5CE0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;padding:48px 24px 100px;}

  /* Header */
  header.board-head{
    text-align:center;
    margin-bottom:28px;
  }
  .board-title{
    font-weight:800;
    font-size:32px;
    letter-spacing:-0.6px;
    margin:0 0 10px;
    color:var(--ink);
  }
  .board-title .accent{color:var(--teal);}
  .board-sub{
    display:inline-block;
    font-size:12.5px;
    font-weight:700;
    color:var(--teal-dark);
    background:var(--teal-light);
    padding:5px 14px;
    border-radius:20px;
    letter-spacing:0.2px;
  }
  .board-meta{
    font-size:12px;
    color:var(--ink-faint);
    font-weight:500;
    margin-top:12px;
  }

  .content{position:relative;}

  .toolbar{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
  }
  .search-box{
    font-family:inherit;font-size:14.5px;padding:12px 20px;border:none;
    border-radius:24px;background:var(--surface);width:320px;max-width:100%;color:var(--ink);
    text-align:center;
    box-shadow:0 6px 20px rgba(20,90,160,0.10);
  }
  .search-box::placeholder{color:var(--ink-faint);}
  .search-box:focus{outline:none;box-shadow:0 0 0 3px var(--teal-light), 0 6px 20px rgba(20,90,160,0.10);}

  /* Calendar */
  .cal-wrap{
    background:var(--surface);border:1px solid var(--border);border-radius:24px;
    padding:32px;box-shadow:0 10px 40px rgba(20,90,160,0.08);
  }
  .cal-head{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:26px;}
  .cal-month{font-weight:800;font-size:21px;letter-spacing:-0.3px;min-width:150px;text-align:center;color:var(--ink);}
  .cal-nav button{
    width:38px;height:38px;border-radius:12px;border:none;background:var(--teal-light);
    color:var(--teal-dark);cursor:pointer;font-size:17px;line-height:1;font-weight:700;
    transition:background .15s ease;
  }
  .cal-nav button:hover{background:var(--teal);color:#fff;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{
    font-size:12.5px;font-weight:800;color:var(--ink-faint);text-align:center;padding:6px 0 12px;
    text-transform:uppercase;letter-spacing:0.3px;
  }
  .cal-dow.sun{color:var(--coral);}
  .cal-dow.sat{color:var(--blue);}

  .cal-cell{
    min-height:108px;border-radius:14px;padding:10px 8px;background:#F3F9FD;
    border:1.5px solid transparent;display:flex;flex-direction:column;gap:5px;
    transition:all .12s ease;
  }
  .cal-cell.empty{background:transparent;}
  .cal-cell.today{border-color:var(--amber);background:var(--amber-light);}
  .cal-cell.today .cal-date{color:#B9791A;}
  .cal-cell.has-items{cursor:pointer;}
  .cal-cell.has-items:hover{background:var(--teal-light);transform:translateY(-1px);}
  .cal-cell.selected{background:var(--teal);border-color:var(--teal-dark);}
  .cal-cell.selected .cal-date{color:#fff;}
  .cal-cell.selected .cal-chip{background:rgba(255,255,255,0.9);color:var(--teal-dark);}
  .cal-cell.selected .cal-more{color:rgba(255,255,255,0.85);}
  .cal-date{font-size:14px;font-weight:700;color:var(--ink);}
  .cal-cell.empty .cal-date{color:transparent;}
  .cal-chip{
    font-size:11.5px;font-weight:700;color:var(--teal-dark);background:var(--teal-light);
    border-radius:7px;padding:4px 7px;line-height:1.35;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .cal-more{font-size:11px;color:var(--ink-soft);font-weight:700;padding-left:2px;}

  .cal-detail{margin-top:28px;padding-top:26px;border-top:2px dashed var(--border);}
  .cal-detail-label{
    font-size:15px;font-weight:800;color:var(--teal-dark);margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .cal-detail-label::before{content:"📦";}
  .cal-detail-items{display:flex;flex-direction:column;gap:10px;}
  .notice-card{
    background:#F3F9FD;border-left:4px solid var(--teal);border-radius:12px;
    padding:16px 20px;
  }
  .notice-title{font-weight:700;font-size:15.5px;color:var(--ink);}
  .notice-body{font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin-top:6px;}
  .code-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .code-chip{
    font-size:13px;font-weight:700;color:var(--teal-dark);background:var(--teal-light);
    border-radius:8px;padding:6px 11px;letter-spacing:0.2px;
  }
  .notice-author{font-size:11.5px;color:var(--ink-faint);margin-top:10px;font-weight:600;}

  .empty-state{
    text-align:center;padding:16px 0 0;color:var(--ink-faint);font-size:13.5px;
  }

  @media (max-width:640px){
    .board-title{font-size:24px;}
    .cal-wrap{padding:18px;}
    .cal-cell{min-height:76px;padding:6px 4px;}
    .cal-chip{font-size:10px;padding:3px 5px;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="board-head">
    <h1 class="board-title">26F/W <span class="accent">수주 출고</span> 스케줄</h1>
    <div><span class="board-sub">대리점 안내용</span></div>
    <div class="board-meta">최근 업데이트 2026.07.22</div>
  </header>

  <div class="content">
    <div class="toolbar">
      <input class="search-box" id="searchBox" type="text" placeholder="상품코드/품목 검색">
    </div>

    <div id="mainView"></div>
  </div>
</div>

<script>
// 여기 배열만 직접 수정하면 출고 스케줄이 반영됩니다.
const NOTICES = [
  { id: 20, title: "게임웨어/캐쥬얼웨어 출고", body: "263TS011/263TS012/263TS035/263TS038/263TS039/263TS040/263TS044/263TS046/263TS048(전략점 전용)", author: "영업지원팀", date: "2026-07-29" },
];

const _today = new Date();
let calYear = _today.getFullYear();
let calMonth = _today.getMonth() + 1; // 1~12
let selectedDate = null;
let searchTerm = "";

function formatDate(d){
  const [y,m,day] = d.split("-");
  return `${m}월 ${day}일`;
}

function noticeCardHTML(n){
  const codes = n.body.split('/').map(c => c.trim()).filter(Boolean);
  const codeChips = codes.map(c => `<span class="code-chip">${c}</span>`).join('');
  return `
    <div class="notice-card">
      <div class="notice-title">${n.title}</div>
      <div class="code-list">${codeChips}</div>
      <div class="notice-author">${n.author} · ${n.date}</div>
    </div>`;
}

function renderCalDetailHTML(dateStr, items){
  if(items.length === 0) return '';
  return `
    <div class="cal-detail">
      <div class="cal-detail-label">${formatDate(dateStr)} 출고 스케줄 (${items.length}건)</div>
      <div class="cal-detail-items">${items.map(noticeCardHTML).join('')}</div>
    </div>`;
}

function renderCalendar(){
  const term = searchTerm.trim().toLowerCase();
  const shipments = NOTICES.filter(n =>
    !term || n.title.toLowerCase().includes(term) || n.body.toLowerCase().includes(term));

  const byDate = {};
  shipments.forEach(n => { (byDate[n.date] = byDate[n.date] || []).push(n); });

  const firstOfMonth = new Date(calYear, calMonth - 1, 1);
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const startWeekday = firstOfMonth.getDay();
  const monthLabel = `${calYear}년 ${calMonth}월`;
  const todayStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;

  if(selectedDate && !selectedDate.startsWith(`${calYear}-${String(calMonth).padStart(2,'0')}`)){
    selectedDate = null;
  }

  let cells = '';
  for(let i=0;i<startWeekday;i++){ cells += `<div class="cal-cell empty"><div class="cal-date">-</div></div>`; }
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const items = byDate[dateStr] || [];
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedDate;
    const hasItems = items.length > 0;
    const chips = items.slice(0,2).map(n => `<div class="cal-chip" title="${n.title}">${n.title}</div>`).join('');
    const more = items.length > 2 ? `<div class="cal-more">+${items.length-2}건</div>` : '';
    const classes = ['cal-cell'];
    if(isToday) classes.push('today');
    if(hasItems) classes.push('has-items');
    if(isSelected) classes.push('selected');
    cells += `
      <div class="${classes.join(' ')}" ${hasItems ? `data-date="${dateStr}"` : ''}>
        <div class="cal-date">${day}</div>
        ${chips}${more}
      </div>`;
  }

  const detail = selectedDate ? renderCalDetailHTML(selectedDate, byDate[selectedDate] || []) : '';
  const totalCount = shipments.length;

  document.getElementById('mainView').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-head">
        <div class="cal-nav"><button id="calPrev">‹</button></div>
        <div class="cal-month">${monthLabel}</div>
        <div class="cal-nav"><button id="calNext">›</button></div>
      </div>
      <div class="cal-grid">
        <div class="cal-dow sun">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow sat">토</div>
        ${cells}
      </div>
      ${detail}
      ${totalCount === 0 ? '<div class="empty-state">검색 결과가 없습니다</div>' : ''}
    </div>`;

  document.getElementById('calPrev').addEventListener('click', () => shiftMonth(-1));
  document.getElementById('calNext').addEventListener('click', () => shiftMonth(1));
  document.querySelectorAll('.cal-cell.has-items').forEach(cell => {
    cell.addEventListener('click', () => {
      const d = cell.dataset.date;
      selectedDate = (selectedDate === d) ? null : d;
      renderCalendar();
    });
  });
}

function shiftMonth(delta){
  calMonth += delta;
  if(calMonth < 1){ calMonth = 12; calYear -= 1; }
  if(calMonth > 12){ calMonth = 1; calYear += 1; }
  renderCalendar();
}

document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderCalendar();
});

renderCalendar();
</script>
</body>
</html>
