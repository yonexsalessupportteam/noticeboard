<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26F/W 수주 출고 스케줄</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  :root{
    --bg:#F5F6F8;
    --surface:#FFFFFF;
    --border:#E4E6EA;
    --ink:#151519;
    --ink-soft:#6B7280;
    --ink-faint:#A8ADB6;
    --shipment:#0F9D8E;
    --shipment-bg:#E1F5F1;
    --shipment-dark:#0B7A6E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;padding:44px 28px 100px;}

  header.board-head{
    text-align:center;
    margin-bottom:30px;
  }
  .board-title{
    font-weight:800;
    font-size:32px;
    letter-spacing:-0.6px;
    margin:0 0 8px;
    color:var(--ink);
  }
  .board-sub{
    font-size:14px;
    color:var(--ink-soft);
    font-weight:500;
  }
  .board-meta{
    font-size:12px;
    color:var(--ink-faint);
    font-weight:500;
    margin-top:6px;
  }

  .toolbar{
    display:flex;
    justify-content:center;
    margin-bottom:24px;
  }
  .search-box{
    font-family:inherit;font-size:15px;padding:12px 20px;border:1.5px solid var(--border);
    border-radius:24px;background:var(--surface);width:320px;max-width:100%;color:var(--ink);
    text-align:center;
  }
  .search-box::placeholder{color:var(--ink-faint);}
  .search-box:focus{outline:none;border-color:var(--shipment);}

  /* Calendar */
  .cal-wrap{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:32px;box-shadow:0 4px 24px rgba(20,25,35,0.05);
  }
  .cal-head{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:24px;}
  .cal-month{font-weight:800;font-size:22px;letter-spacing:-0.3px;min-width:160px;text-align:center;}
  .cal-nav button{
    width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--ink-soft);cursor:pointer;font-size:17px;line-height:1;
  }
  .cal-nav button:hover{border-color:var(--shipment);color:var(--shipment-dark);}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{
    font-size:13px;font-weight:700;color:var(--ink-faint);text-align:center;padding:6px 0 12px;
  }
  .cal-dow.sun{color:#D14343;}
  .cal-dow.sat{color:#2F5CE0;}

  .cal-cell{
    min-height:112px;border-radius:12px;padding:10px 8px;background:var(--bg);
    border:1.5px solid transparent;display:flex;flex-direction:column;gap:5px;
  }
  .cal-cell.empty{background:transparent;}
  .cal-cell.today{border-color:var(--shipment);background:#F0FAF8;}
  .cal-cell.has-items{cursor:pointer;transition:all .12s ease;}
  .cal-cell.has-items:hover{background:var(--shipment-bg);}
  .cal-cell.selected{background:var(--shipment-bg);border-color:var(--shipment-dark);}
  .cal-date{font-size:14px;font-weight:700;color:var(--ink);}
  .cal-cell.empty .cal-date{color:transparent;}
  .cal-chip{
    font-size:12px;font-weight:700;color:var(--shipment-dark);background:var(--shipment-bg);
    border-radius:6px;padding:4px 7px;line-height:1.35;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .cal-more{font-size:11.5px;color:var(--ink-soft);font-weight:600;padding-left:2px;}

  .cal-detail{margin-top:26px;padding-top:24px;border-top:1px solid var(--border);}
  .cal-detail-label{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:14px;}
  .cal-detail-items{display:flex;flex-direction:column;gap:10px;}
  .notice-card{
    background:var(--bg);border:1px solid var(--border);border-radius:14px;
    padding:18px 20px;
  }
  .notice-title{font-weight:700;font-size:16px;color:var(--ink);}
  .notice-body{font-size:14px;color:var(--ink-soft);line-height:1.6;margin-top:6px;}
  .notice-author{font-size:12px;color:var(--ink-faint);margin-top:10px;font-weight:500;}

  .empty-state{
    text-align:center;padding:16px 0 0;color:var(--ink-faint);font-size:13.5px;
  }

  @media (max-width:640px){
    .board-title{font-size:24px;}
    .cal-wrap{padding:18px;}
    .cal-cell{min-height:80px;padding:6px 4px;}
    .cal-chip{font-size:10.5px;padding:3px 5px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="board-head">
    <h1 class="board-title">26F/W 수주 출고 스케줄</h1>
    <div class="board-sub">대리점 안내용</div>
    <div class="board-meta">최근 업데이트 2026.07.22</div>
  </header>

  <div class="toolbar">
    <input class="search-box" id="searchBox" type="text" placeholder="상품코드/품목 검색">
  </div>

  <div id="mainView"></div>

</div>

<script>
// 여기 배열만 직접 수정하면 출고 스케줄이 반영됩니다.
const NOTICES = [
  { id: 20, title: "게임웨어/캐쥬얼웨어 출고", body: "263TS011/012/263TS035/263TS038~040/263TS044/263TS046/048(전략점 전용)", author: "영업지원팀", date: "2026-07-29" },
];

const _today = new Date();
let calYear = _today.getFullYear();
let calMonth = _today.getMonth() + 1; // 1~12
let selectedDate = null;
let searchTerm = "";

function formatDate(d){
  const [y,m,day] = d.split("-");
  return `${m}월 ${day}일`;
}

function noticeCardHTML(n){
  return `
    <div class="notice-card">
      <div class="notice-title">${n.title}</div>
      <div class="notice-body">${n.body}</div>
      <div class="notice-author">${n.author} · ${n.date}</div>
    </div>`;
}

function renderCalDetailHTML(dateStr, items){
  if(items.length === 0) return '';
  return `
    <div class="cal-detail">
      <div class="cal-detail-label">${formatDate(dateStr)} 출고 스케줄 (${items.length}건)</div>
      <div class="cal-detail-items">${items.map(noticeCardHTML).join('')}</div>
    </div>`;
}

function renderCalendar(){
  const term = searchTerm.trim().toLowerCase();
  const shipments = NOTICES.filter(n =>
    !term || n.title.toLowerCase().includes(term) || n.body.toLowerCase().includes(term));

  const byDate = {};
  shipments.forEach(n => { (byDate[n.date] = byDate[n.date] || []).push(n); });

  const firstOfMonth = new Date(calYear, calMonth - 1, 1);
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const startWeekday = firstOfMonth.getDay();
  const monthLabel = `${calYear}년 ${calMonth}월`;
  const todayStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;

  if(selectedDate && !selectedDate.startsWith(`${calYear}-${String(calMonth).padStart(2,'0')}`)){
    selectedDate = null;
  }

  let cells = '';
  for(let i=0;i<startWeekday;i++){ cells += `<div class="cal-cell empty"><div class="cal-date">-</div></div>`; }
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const items = byDate[dateStr] || [];
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === selectedDate;
    const hasItems = items.length > 0;
    const chips = items.slice(0,2).map(n => `<div class="cal-chip" title="${n.title}">${n.title}</div>`).join('');
    const more = items.length > 2 ? `<div class="cal-more">+${items.length-2}건</div>` : '';
    const classes = ['cal-cell'];
    if(isToday) classes.push('today');
    if(hasItems) classes.push('has-items');
    if(isSelected) classes.push('selected');
    cells += `
      <div class="${classes.join(' ')}" ${hasItems ? `data-date="${dateStr}"` : ''}>
        <div class="cal-date">${day}</div>
        ${chips}${more}
      </div>`;
  }

  const detail = selectedDate ? renderCalDetailHTML(selectedDate, byDate[selectedDate] || []) : '';
  const totalCount = shipments.length;

  document.getElementById('mainView').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-head">
        <div class="cal-nav"><button id="calPrev">‹</button></div>
        <div class="cal-month">${monthLabel}</div>
        <div class="cal-nav"><button id="calNext">›</button></div>
      </div>
      <div class="cal-grid">
        <div class="cal-dow sun">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow sat">토</div>
        ${cells}
      </div>
      ${detail}
      ${totalCount === 0 ? '<div class="empty-state">검색 결과가 없습니다</div>' : ''}
    </div>`;

  document.getElementById('calPrev').addEventListener('click', () => shiftMonth(-1));
  document.getElementById('calNext').addEventListener('click', () => shiftMonth(1));
  document.querySelectorAll('.cal-cell.has-items').forEach(cell => {
    cell.addEventListener('click', () => {
      const d = cell.dataset.date;
      selectedDate = (selectedDate === d) ? null : d;
      renderCalendar();
    });
  });
}

function shiftMonth(delta){
  calMonth += delta;
  if(calMonth < 1){ calMonth = 12; calYear -= 1; }
  if(calMonth > 12){ calMonth = 1; calYear += 1; }
  renderCalendar();
}

document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderCalendar();
});

renderCalendar();
</script>
</body>
</html>
